name: Build (Windows & macOS)

# 推送 v* 标签时自动构建 Windows 与 macOS 应用并发布到 Release；也可在网页手动触发。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            label: windows
          - os: macos-latest
            label: macos
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: 读取版本号
        id: ver
        shell: bash
        run: echo "v=$(grep -oE '__version__[[:space:]]*=[[:space:]]*\"[^\"]+\"' src/chinese_chess/__init__.py | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')" >> "$GITHUB_OUTPUT"

      - name: PyInstaller 打包
        shell: bash
        run: pyinstaller packaging/chinese_chess.spec --clean -y

      - name: 冻结烟测 (macOS) —— 能启动、各界面可构建
        if: matrix.label == 'macos'
        shell: bash
        env:
          CHINESE_CHESS_SELFTEST: "1"
          CHINESE_CHESS_SELFTEST_OUT: "selftest.txt"
          SDL_VIDEODRIVER: "dummy"
          SDL_AUDIODRIVER: "dummy"
        run: |
          "dist/ChineseChess_v${{ steps.ver.outputs.v }}.app/Contents/MacOS/ChineseChess_v${{ steps.ver.outputs.v }}" || true
          cat selftest.txt
          grep -q "SELFTEST PASS" selftest.txt

      - name: 冻结烟测 (Windows) —— 能启动、各界面可构建
        if: matrix.label == 'windows'
        shell: pwsh
        env:
          CHINESE_CHESS_SELFTEST: "1"
          CHINESE_CHESS_SELFTEST_OUT: "selftest.txt"
          SDL_VIDEODRIVER: "dummy"
          SDL_AUDIODRIVER: "dummy"
        run: |
          Start-Process -FilePath "dist/ChineseChess_v${{ steps.ver.outputs.v }}/ChineseChess_v${{ steps.ver.outputs.v }}.exe" `
            -WorkingDirectory $PWD -Wait
          if (-not (Test-Path selftest.txt)) { Write-Error "selftest.txt 未生成"; exit 1 }
          Get-Content selftest.txt
          if (-not (Select-String -Path selftest.txt -Pattern "SELFTEST PASS")) { exit 1 }

      - name: 打包产物 (macOS .app → zip)
        if: matrix.label == 'macos'
        shell: bash
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent \
            "ChineseChess_v${{ steps.ver.outputs.v }}.app" \
            "../ChineseChess_v${{ steps.ver.outputs.v }}-macos.zip"

      - name: 打包产物 (Windows 文件夹 → zip)
        if: matrix.label == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/ChineseChess_v${{ steps.ver.outputs.v }}" `
            -DestinationPath "ChineseChess_v${{ steps.ver.outputs.v }}-windows.zip"

      - name: 上传构建产物为 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChineseChess-${{ matrix.label }}
          path: "ChineseChess_v${{ steps.ver.outputs.v }}-${{ matrix.label }}.zip"
          if-no-files-found: error

  # 单独的发布任务：等两个平台都构建完，集中下载产物一次性发布，避免多任务并发创建 Release 冲突。
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: 下载全部构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 发布到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          fail_on_unmatched_files: true
